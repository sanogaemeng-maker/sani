<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sani Shexane | Official Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Poppins:wght@300;500;700&display=swap');

        :root {
            --main-purple: #a855f7;
            --dark-purple: #581c87;
            --glow-color: #d8b4fe;
            --bg-black: #05010d;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', 'Noto Sans Arabic', sans-serif;
        }

        body {
            background-color: var(--bg-black);
            background-image: 
                radial-gradient(circle at 20% 30%, #2e1065 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #4c1d95 0%, transparent 40%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* کارتی سەرەکی */
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.2);
            padding: 40px 30px;
            border-radius: 50px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(168, 85, 247, 0.1);
            position: relative;
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* وێنەی پرۆفایل لەگەڵ بریقە */
        .img-area {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
        }

        .img-area img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--main-purple);
            box-shadow: 0 0 25px var(--main-purple);
            z-index: 5;
            position: relative;
        }

        .img-area::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border-radius: 50%;
            background: linear-gradient(45deg, transparent, var(--main-purple), transparent);
            animation: rotateLine 3s linear infinite;
        }

        @keyframes rotateLine {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* تێکستەکان */
        h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(to bottom, #fff 30%, var(--main-purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            filter: drop-shadow(0 0 5px rgba(168, 85, 247, 0.5));
        }

        .bio {
            font-size: 14px;
            color: var(--glow-color);
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .welcome-msg {
            font-family: 'Noto Sans Arabic';
            font-size: 16px;
            color: #efeff1;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        /* ستایلی لینکەکان */
        .social-links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-item i {
            font-size: 22px;
        }

        .link-item span {
            font-size: 16px;
        }

        /* کارلێکەکان (Hover) */
        .link-item:hover {
            transform: scale(1.05);
            background: rgba(168, 85, 247, 0.2);
            border-color: var(--main-purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
        }

        .snapchat:hover { color: #FFFC00; text-shadow: 0 0 10px rgba(255, 252, 0, 0.5); }
        .instagram:hover { color: #ff007f; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }
        .tiktok:hover { color: #00f2ea; text-shadow: 0 0 10px rgba(0, 242, 234, 0.5); }
        .facebook:hover { color: #1877F2; text-shadow: 0 0 10px rgba(24, 119, 242, 0.5); }

        /* بڵقی جوڵاو لە باکگراوند */
        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <div class="profile-card">
        <div class="img-area">
            <!-- لێرە وێنەکەی خۆت چێنراوە -->
            <img src="data:image/jpeg;base64,<!--BASE64_DATA-->" alt="Sani Shexane" id="profilePic">
        </div>

        <h1>سانی شێخانی</h1>
        <p class="bio">@sane_09 | Digital Creator</p>
        
        <div class="welcome-msg">
            بەخێربێن بۆ جیهانی من، لێرەوە دەتوانن لە هەموو سۆشیاڵەکانم لەگەڵم بن.
        </div>

        <div class="social-links">
            <a href="https://www.snapchat.com/add/sane_09?share_id=ws6ZnKqdrqI&locale=ar-EG" class="link-item snapchat" target="_blank">
                <i class="fab fa-snapchat"></i>
                <span>Snapchat</span>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://www.instagram.com/sani.shexane?igsh=cTEwc3g5NXpzZnRq" class="link-item instagram" target="_blank">
                <i class="fab fa-instagram"></i>
                <span>Instagram</span>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://www.tiktok.com/@rango_s?_r=1&_t=ZS-963wXPnXRQq" class="link-item tiktok" target="_blank">
                <i class="fab fa-tiktok"></i>
                <span>TikTok</span>
                <i class="fas fa-chevron-left"></i>
            </a>

            <a href="https://www.facebook.com/share/18xtKnW6zr/" class="link-item facebook" target="_blank">
                <i class="fab fa-facebook-f"></i>
                <span>Facebook</span>
                <i class="fas fa-chevron-left"></i>
            </a>
        </div>
    </div>

    <script>
        // ئەم بەشە وێنەکە جێگیر دەکات
        document.getElementById('profilePic').src = "https://i.ibb.co/LhqYnLp/input-file-0.jpg";

        // دروستکردنی بڵقی جوڵاو بۆ باکگراوندەکە
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const particle = document.createElement('div');
            particle.style.position = 'absolute';
            particle.style.width = Math.random() * 5 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = 'rgba(168, 85, 247, 0.3)';
            particle.style.borderRadius = '50%';
            particle.style.top = Math.random() * 100 + 'vh';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animation = `float ${Math.random() * 10 + 5}s linear infinite`;
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
